<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f5f3;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:2rem;width:360px}
  .brand{font-size:20px;font-weight:600;margin-bottom:1.5rem}
  .brand span{color:#4f46e5}
  label{font-size:12px;color:#666;display:block;margin-bottom:4px}
  input{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:14px}
  .error{color:#e53e3e;font-size:13px;margin-bottom:12px}
  button{width:100%;padding:10px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
  .hint{margin-top:12px;background:#f5f5f3;border-radius:8px;padding:10px;font-size:12px;color:#666;text-align:center}
</style>

<div class="card">
  <div class="brand">Staff<span>Base</span></div>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter username" required>
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>
    <button type="submit">Sign in</button>
  </form>
  <div class="hint">Use: sahil / Srv@Raj222</div>
</div>
</body>
</html>
